<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>silsil</title>

<!-- PWA / iOS 홈 화면 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="silsil">
<link rel="apple-touch-icon" href="app_icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#faf9f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1c1a18" media="(prefers-color-scheme: dark)">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600&display=swap">

<style>
:root{
  --bg:#faf9f7;
  --card:#ffffff;
  --ink:#2d2a26;
  --ink-soft:#6e675e;
  --ink-faint:#a39b90;
  --line:#e8e3dc;
  --accent:#2d2a26;
  --accent-soft:#eae7e2;
  --done:#faf9f7;
  --done-soft:#2d2a26;
  --wip:#2d2a26;
  --wip-soft:#dcd7cf;
  --todo:#8b8378;
  --todo-soft:#eeebe6;
  --shadow:0 1px 3px rgba(45,42,38,.06),0 4px 14px rgba(45,42,38,.05);
  --radius:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1a18;
    --card:#262421;
    --ink:#eae6df;
    --ink-soft:#a8a096;
    --ink-faint:#6e675e;
    --line:#37332e;
    --accent:#eae6df;
    --accent-soft:#33302b;
    --done:#1c1a18;
    --done-soft:#eae6df;
    --wip:#eae6df;
    --wip-soft:#44403a;
    --todo:#a8a096;
    --todo-soft:#2e2b27;
    --shadow:0 1px 3px rgba(0,0,0,.25),0 4px 14px rgba(0,0,0,.2);
  }
  .sync-dot.ok{background:#7fa583}
  .sync-dot.pending{background:#d9a13f}
  .sync-dot.err{background:#d06552}
  .img-grid .ph .rm{background:rgba(0,0,0,.6)}
  .danger-btn{border-color:#6b4038;color:#d98274}
  .danger-btn:active{background:#332320}
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;
  background:var(--bg);color:var(--ink);
  padding-bottom:env(safe-area-inset-bottom);
  overscroll-behavior-y:contain;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
input,textarea,select{font:inherit;color:inherit}
img{display:block}

/* ---------- 상단바 ---------- */
.topbar{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:10px;
  padding:calc(12px + env(safe-area-inset-top)) 18px 12px;
  background:color-mix(in srgb,var(--bg) 88%,transparent);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.topbar h1{font-family:Outfit,"Pretendard Variable",sans-serif;font-size:20px;font-weight:600;letter-spacing:.01em}
.topbar h1 em{font-style:normal;font-weight:300}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-faint);flex:none;transition:background .3s}
.sync-dot.ok{background:var(--done)}
.sync-dot.pending{background:#d9a13f}
.sync-dot.err{background:#c0392b}
.topbar .spacer{flex:1}
.icon-btn{
  width:38px;height:38px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-soft);
}
.icon-btn:active{background:var(--line)}
.icon-btn svg{width:21px;height:21px}
.add-btn{
  background:var(--accent);color:var(--bg);border-radius:11px;
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
}
.add-btn svg{width:20px;height:20px}
.add-btn:active{filter:brightness(.92)}

/* ---------- 필터 칩 ---------- */
.chips{display:flex;gap:8px;padding:14px 18px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chip{
  flex:none;padding:7px 14px;border-radius:999px;font-size:13.5px;font-weight:600;
  background:var(--card);border:1px solid var(--line);color:var(--ink-soft);
}
.chip.on{background:var(--ink);border-color:var(--ink);color:var(--bg)}

/* ---------- 카드 그리드 ---------- */
.grid{
  display:grid;gap:14px;padding:14px 18px 40px;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
}
@media(min-width:700px){.grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}}
.card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  overflow:hidden;text-align:left;display:flex;flex-direction:column;
  border:1px solid var(--line);
  transition:transform .12s;
}
.card:active{transform:scale(.98)}
.card .thumb{
  aspect-ratio:4/3;background:var(--todo-soft);
  display:flex;align-items:center;justify-content:center;color:var(--ink-faint);
  overflow:hidden;
}
.card .thumb img{width:100%;height:100%;object-fit:cover}
.card .thumb svg{width:30px;height:30px;opacity:.5}
.card .body{padding:11px 13px 13px;display:flex;flex-direction:column;gap:6px;flex:1}
.card .title{font-size:15px;font-weight:700;letter-spacing:-.01em;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{font-size:12.5px;color:var(--ink-soft);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .foot{display:flex;align-items:center;gap:6px;margin-top:auto;padding-top:2px}
.badge{font-size:11.5px;font-weight:700;padding:3.5px 9px;border-radius:999px}
.badge.todo{background:var(--todo-soft);color:var(--todo)}
.badge.wip{background:var(--wip-soft);color:var(--wip)}
.badge.done{background:var(--done-soft);color:var(--done)}
.dots{font-size:11px;letter-spacing:1.5px;color:var(--accent)}
.dots .off{color:var(--line)}

.empty{
  grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--ink-faint);
  font-size:14.5px;line-height:1.7;
}
.empty strong{color:var(--ink-soft)}

/* ---------- 시트(상세/편집/설정 공용) ---------- */
.sheet{
  position:fixed;inset:0;z-index:40;background:var(--bg);
  display:none;flex-direction:column;
}
.sheet.open{display:flex}
.sheet-head{
  display:flex;align-items:center;gap:8px;flex:none;
  padding:calc(12px + env(safe-area-inset-top)) 14px 12px;
  border-bottom:1px solid var(--line);background:var(--bg);
}
.sheet-head .s-title{font-size:16.5px;font-weight:800;letter-spacing:-.01em;
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:60px}
.text-btn{font-size:15px;font-weight:700;color:var(--accent);padding:8px 10px;border-radius:9px}
.text-btn:active{background:var(--accent-soft)}
.text-btn.muted{color:var(--ink-soft)}
.text-btn:disabled{opacity:.4}

/* ---------- 상세 ---------- */
.gallery{display:flex;gap:10px;overflow-x:auto;padding:16px 18px 4px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.gallery img{
  height:240px;border-radius:12px;scroll-snap-align:start;flex:none;
  max-width:86vw;object-fit:cover;background:var(--todo-soft);
}
@media(min-width:700px){.gallery img{height:320px}}
.detail-main{padding:18px;max-width:720px;margin:0 auto}
.detail-main h2{font-size:23px;font-weight:800;letter-spacing:-.02em;line-height:1.25;margin-bottom:10px}
.detail-tags{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.spec{
  display:grid;grid-template-columns:auto 1fr;gap:9px 16px;
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:15px 17px;margin-bottom:20px;font-size:14.5px;
}
.spec dt{color:var(--ink-faint);font-size:13px;font-weight:600;padding-top:1px}
.spec dd{min-width:0;word-break:break-word}
.spec dd a{color:var(--accent);word-break:break-all}
.notes-view{font-size:15.5px;line-height:1.85;white-space:pre-wrap;word-break:break-word}
.notes-view:empty::before{content:"아직 기록이 없어요.";color:var(--ink-faint)}
.section-label{
  font-size:12px;font-weight:800;letter-spacing:.08em;color:var(--ink-faint);
  text-transform:uppercase;margin:0 0 9px;
}

/* ---------- 편집 폼 ---------- */
.form{padding:18px;max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:6px}
.field input[type=text],.field input[type=url],.field input[type=date],.field select,.field textarea{
  width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:11px;
  padding:11px 13px;font-size:15.5px;outline:none;-webkit-appearance:none;appearance:none;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:none;line-height:1.75;min-height:150px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.seg{display:flex;background:var(--card);border:1.5px solid var(--line);border-radius:11px;overflow:hidden}
.seg button{flex:1;padding:10px 4px;font-size:14px;font-weight:600;color:var(--ink-soft)}
.seg button.on{background:var(--ink);color:var(--bg);font-weight:700}
.diff-pick{display:flex;gap:6px;padding:4px 0}
.diff-pick button{font-size:22px;color:var(--line);padding:2px 3px;transition:color .1s}
.diff-pick button.on{color:var(--accent)}

.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:9px}
.img-grid .ph{
  position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--todo-soft);
}
.img-grid .ph img{width:100%;height:100%;object-fit:cover}
.img-grid .ph .rm{
  position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:50%;
  background:rgba(30,27,24,.65);color:#fff;font-size:14px;line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.img-grid .ph .spin{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.55)}
.img-add{
  aspect-ratio:1;border:1.5px dashed var(--ink-faint);border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  color:var(--ink-soft);font-size:12.5px;font-weight:600;
}
.img-add:active{background:var(--accent-soft)}
.img-add svg{width:22px;height:22px}

.danger-zone{padding:6px 0 30px}
.danger-btn{width:100%;padding:13px;border-radius:11px;background:none;border:1.5px solid #d8b1a8;color:#c0392b;font-weight:700;font-size:15px}
.danger-btn:active{background:#f8ece9}

/* ---------- 설정 ---------- */
.settings{padding:20px 18px;max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:18px;font-size:15px}
.settings .box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px}
.settings .box p{color:var(--ink-soft);font-size:13.5px;line-height:1.65;margin-top:8px}
.settings input{width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;margin-top:10px;outline:none}
.settings input:focus{border-color:var(--accent)}
.settings .primary{margin-top:12px;width:100%;background:var(--accent);color:#fff;border-radius:11px;padding:12px;font-weight:700;font-size:15px}
.settings .status-line{font-size:13.5px;color:var(--ink-soft);margin-top:10px}
.settings code{background:var(--todo-soft);padding:2px 6px;border-radius:6px;font-size:12.5px}

/* ---------- 토스트 ---------- */
#toast{
  position:fixed;left:50%;bottom:calc(28px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:999px;
  font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:99;
  max-width:86vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.spinner{width:20px;height:20px;border:2.5px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header class="topbar">
  <h1>sil<em>sil</em></h1>
  <div class="sync-dot" id="syncDot" title="동기화 상태"></div>
  <div class="spacer"></div>
  <button class="icon-btn" id="settingsBtn" aria-label="설정">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <button class="add-btn" id="addBtn" aria-label="새 프로젝트">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</header>

<nav class="chips" id="chips"></nav>
<main class="grid" id="grid"></main>

<!-- 상세 -->
<div class="sheet" id="detailSheet">
  <div class="sheet-head">
    <button class="icon-btn" data-close="detailSheet" aria-label="목록으로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="s-title" id="dTitleBar"></div>
    <button class="icon-btn" id="editBtn" aria-label="편집">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></svg>
    </button>
  </div>
  <div class="sheet-body">
    <div class="gallery" id="dGallery"></div>
    <div class="detail-main">
      <h2 id="dTitle"></h2>
      <div class="detail-tags" id="dTags"></div>
      <dl class="spec" id="dSpec"></dl>
      <p class="section-label">기록</p>
      <div class="notes-view" id="dNotes"></div>
    </div>
  </div>
</div>

<!-- 편집 -->
<div class="sheet" id="editSheet">
  <div class="sheet-head">
    <button class="icon-btn" id="editCancel" aria-label="취소">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div class="s-title" id="eTitleBar">새 프로젝트</div>
    <button class="icon-btn" id="editSave" aria-label="저장" style="color:var(--accent)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </button>
  </div>
  <div class="sheet-body">
    <div class="form">
      <div class="field"><label>제목</label>
        <input type="text" id="fTitle" autocomplete="off"></div>
      <div class="field"><label>도안</label>
        <input type="text" id="fPattern" autocomplete="off"></div>
      <div class="row2">
        <div class="field"><label>실 종류</label>
          <input type="text" id="fYarn" autocomplete="off"></div>
        <div class="field"><label>바늘 사이즈</label>
          <input type="text" id="fNeedle" autocomplete="off"></div>
      </div>
      <div class="field"><label>난이도</label><div class="diff-pick" id="fDiff"></div></div>
      <div class="row2">
        <div class="field"><label>시작한 날짜</label><input type="date" id="fDate"></div>
        <div class="field"><label>완성한 날짜</label><input type="date" id="fEnd"></div>
      </div>
      <div class="field"><label>진행상태</label>
        <div class="seg" id="fStatus">
          <button data-v="todo">시작 전</button>
          <button data-v="wip">진행중</button>
          <button data-v="done">완성</button>
        </div>
      </div>
      <div class="field"><label>사진</label>
        <div class="img-grid" id="fImgs"></div>
        <input type="file" id="fileInput" accept="image/*" multiple hidden>
      </div>
      <div class="field"><label>기록</label>
        <textarea id="fNotes"></textarea></div>
      <div class="danger-zone" id="deleteZone" hidden>
        <button class="danger-btn" id="deleteBtn">이 프로젝트 삭제</button>
      </div>
    </div>
  </div>
</div>

<!-- 설정 -->
<div class="sheet" id="settingsSheet">
  <div class="sheet-head">
    <button class="icon-btn" data-close="settingsSheet" aria-label="닫기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div class="s-title">설정</div>
  </div>
  <div class="sheet-body">
    <div class="settings">
      <div class="box">
        <strong>GitHub 연결</strong>
        <p>데이터와 사진은 <code>eightftunder/silsil</code> repo에 저장돼요. Contents 읽기/쓰기 권한이 있는 fine-grained token을 한 번만 넣으면 이 기기에 저장돼요.</p>
        <input type="password" id="tokenInput" autocomplete="off">
        <button class="primary" id="tokenSave">토큰 저장 & 연결 확인</button>
        <div class="status-line" id="connStatus"></div>
      </div>
      <div class="box">
        <strong>동기화</strong>
        <p id="syncInfo">-</p>
        <button class="primary" id="pullBtn">GitHub에서 다시 불러오기</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ================= 설정 상수 ================= */
const GH_USER = 'eightftunder';
const GH_REPO = 'silsil';
const GH_BRANCH = 'main';
const DATA_PATH = 'data/projects.json';
const IMG_DIR = 'images';
const API = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/`;
const MAX_PX = 1600, QUALITY = 0.82;

const LS_DATA = 'nl_data', LS_TOKEN = 'nl_token', LS_SHA = 'nl_sha', LS_SYNCED = 'nl_synced_at';

/* ================= 상태 ================= */
let state = load();
let filter = 'all';
let editing = null;      // 편집 중인 프로젝트 사본
let editingIsNew = false;
let dataSha = localStorage.getItem(LS_SHA) || null;
let saveTimer = null;
const imgCache = new Map();   // path -> objectURL
const pendingUploads = new Set();

function load(){
  try{ return JSON.parse(localStorage.getItem(LS_DATA)) || {projects:[]} }
  catch{ return {projects:[]} }
}
function persistLocal(){ localStorage.setItem(LS_DATA, JSON.stringify(state)); }
const token = () => localStorage.getItem(LS_TOKEN) || '';
const uid = () => crypto.randomUUID();
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const STATUS = {todo:'시작 전', wip:'진행중', done:'완성'};

/* ================= 토스트 & 동기화 표시 ================= */
let toastT;
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 2400);
}
function setSync(s){ $('syncDot').className = 'sync-dot' + (s ? ' '+s : ''); }

/* ================= GitHub API ================= */
async function gh(path, opts={}){
  const res = await fetch(API + path + (opts.method ? '' : `?ref=${GH_BRANCH}&t=${Date.now()}`), {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + token(),
      'Accept': opts.raw ? 'application/vnd.github.raw+json' : 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(opts.headers||{})
    }
  });
  return res;
}

function b64encode(str){ // 유니코드 안전
  return btoa(String.fromCharCode(...new TextEncoder().encode(str)));
}
function blobToB64(blob){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

/* ---- 데이터 pull ---- */
async function pullData(silent){
  if(!token()){ setSync(''); return; }
  try{
    const res = await gh(DATA_PATH);
    if(res.status === 404){ dataSha = null; setSync('ok'); if(!silent) toast('repo에 데이터 파일이 아직 없어요'); return; }
    if(!res.ok) throw new Error(res.status);
    const j = await res.json();
    dataSha = j.sha; localStorage.setItem(LS_SHA, dataSha);
    const text = new TextDecoder().decode(Uint8Array.from(atob(j.content.replace(/\n/g,'')), c=>c.charCodeAt(0)));
    state = JSON.parse(text);
    persistLocal();
    localStorage.setItem(LS_SYNCED, Date.now());
    setSync('ok'); renderGrid(); renderSyncInfo();
    if(!silent) toast('불러왔어요');
  }catch(e){
    setSync('err');
    if(!silent) toast('불러오기 실패: ' + e.message);
  }
}

/* ---- 데이터 push (디바운스) ---- */
function scheduleSave(){
  persistLocal();
  setSync('pending');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(pushData, 1500);
}
async function pushData(retried){
  if(!token()){ setSync('err'); return; }
  try{
    const body = {
      message: 'update projects',
      content: b64encode(JSON.stringify(state, null, 2)),
      branch: GH_BRANCH,
      ...(dataSha ? {sha: dataSha} : {})
    };
    const res = await gh(DATA_PATH, {method:'PUT', body: JSON.stringify(body)});
    if(res.status === 409 || res.status === 422){
      if(retried) throw new Error('충돌');
      // sha 갱신 후 1회 재시도
      const cur = await gh(DATA_PATH);
      if(cur.ok){ dataSha = (await cur.json()).sha; }
      else if(cur.status === 404){ dataSha = null; }
      return pushData(true);
    }
    if(!res.ok) throw new Error(res.status);
    const j = await res.json();
    dataSha = j.content.sha; localStorage.setItem(LS_SHA, dataSha);
    localStorage.setItem(LS_SYNCED, Date.now());
    setSync('ok'); renderSyncInfo();
  }catch(e){
    setSync('err');
    toast('저장 실패: ' + e.message + ' (로컬엔 저장됨)');
  }
}

/* ---- 이미지 ---- */
async function compressImage(file){
  const url = URL.createObjectURL(file);
  const img = await new Promise((res,rej)=>{
    const i = new Image();
    i.onload = ()=>res(i); i.onerror = rej; i.src = url;
  });
  let {width:w, height:h} = img;
  if(Math.max(w,h) > MAX_PX){
    const r = MAX_PX / Math.max(w,h);
    w = Math.round(w*r); h = Math.round(h*r);
  }
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  URL.revokeObjectURL(url);

  let blob = await new Promise(r=>canvas.toBlob(r, 'image/webp', QUALITY));
  let ext = 'webp';
  if(!blob || blob.type !== 'image/webp'){ // Safari 폴백
    blob = await new Promise(r=>canvas.toBlob(r, 'image/jpeg', QUALITY));
    ext = 'jpg';
  }
  return {blob, ext};
}

async function uploadImage(file){
  const {blob, ext} = await compressImage(file);
  const path = `${IMG_DIR}/${uid()}.${ext}`;
  const res = await gh(path, {method:'PUT', body: JSON.stringify({
    message: 'add image', branch: GH_BRANCH, content: await blobToB64(blob)
  })});
  if(!res.ok) throw new Error('업로드 실패 ' + res.status);
  imgCache.set(path, URL.createObjectURL(blob));
  return path;
}

async function deleteRemoteImage(path){
  try{
    const cur = await gh(path);
    if(!cur.ok) return;
    const sha = (await cur.json()).sha;
    await gh(path, {method:'DELETE', body: JSON.stringify({message:'delete image', branch:GH_BRANCH, sha})});
  }catch(e){ /* 이미지 삭제 실패는 치명적이지 않음 */ }
}

function imgUrl(path){
  // public repo → raw URL 직접 사용. 방금 업로드한 이미지는 캐시(blob URL)가 우선.
  if(imgCache.has(path)) return imgCache.get(path);
  return `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}/${path}`;
}
function hydrateImg(el, path){
  el.loading = 'lazy';
  el.src = imgUrl(path);
}

/* ================= 목록 렌더 ================= */
const chipDefs = [['all','전체'],['todo','시작 전'],['wip','진행중'],['done','완성']];
function renderChips(){
  $('chips').innerHTML = chipDefs.map(([v,l])=>{
    const n = v==='all' ? state.projects.length : state.projects.filter(p=>p.status===v).length;
    return `<button class="chip${filter===v?' on':''}" data-v="${v}">${l}${n?` ${n}`:''}</button>`;
  }).join('');
}
$('chips').addEventListener('click', e=>{
  const b = e.target.closest('.chip'); if(!b) return;
  filter = b.dataset.v; renderGrid();
});

function diffDots(n){
  n = n||0;
  return `<span class="dots">${'●'.repeat(n)}<span class="off">${'●'.repeat(5-n)}</span></span>`;
}

function renderGrid(){
  renderChips();
  const list = state.projects
    .filter(p => filter==='all' || p.status===filter)
    .sort((a,b) => (b.updatedAt||0)-(a.updatedAt||0));
  const g = $('grid');
  if(!list.length){
    g.innerHTML = `<div class="empty"><strong>${filter==='all'?'아직 프로젝트가 없어요':'여기엔 아직 없어요'}</strong><br>오른쪽 위 ＋ 버튼으로 시작해요.</div>`;
    return;
  }
  g.innerHTML = list.map(p=>`
    <button class="card" data-id="${p.id}">
      <div class="thumb">${p.images?.length
        ? `<img data-path="${esc(p.images[0])}" alt="">`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 15c4-6 8 6 12 0M4 9c4-6 8 6 12 0" stroke-linecap="round"/></svg>`}
      </div>
      <div class="body">
        <div class="title">${esc(p.title)||'(제목 없음)'}</div>
        <div class="meta">${esc([p.yarn,p.needle].filter(Boolean).join(' · '))}</div>
        <div class="foot">
          <span class="badge ${p.status}">${STATUS[p.status]}</span>
          ${p.difficulty?diffDots(p.difficulty):''}
        </div>
      </div>
    </button>`).join('');
  g.querySelectorAll('img[data-path]').forEach(el=>hydrateImg(el, el.dataset.path));
}
$('grid').addEventListener('click', e=>{
  const c = e.target.closest('.card'); if(!c) return;
  openDetail(c.dataset.id);
});

/* ================= 상세 ================= */
let detailId = null;
function openDetail(id){
  const p = state.projects.find(x=>x.id===id); if(!p) return;
  detailId = id;
  $('dTitleBar').textContent = p.title || '(제목 없음)';
  $('dTitle').textContent = p.title || '(제목 없음)';
  $('dTags').innerHTML = `<span class="badge ${p.status}">${STATUS[p.status]}</span>` +
    (p.difficulty ? diffDots(p.difficulty) : '');
  const rows = [];
  if(p.pattern){
    const isUrl = /^https?:\/\//i.test(p.pattern.trim());
    rows.push(['도안', isUrl ? `<a href="${esc(p.pattern.trim())}" target="_blank" rel="noopener">${esc(p.pattern.trim())}</a>` : esc(p.pattern)]);
  }
  if(p.yarn) rows.push(['실', esc(p.yarn)]);
  if(p.needle) rows.push(['바늘', esc(p.needle)]);
  if(p.startDate) rows.push(['시작', esc(p.startDate)]);
  if(p.endDate) rows.push(['완성', esc(p.endDate)]);
  $('dSpec').innerHTML = rows.map(([k,v])=>`<dt>${k}</dt><dd>${v}</dd>`).join('');
  $('dSpec').style.display = rows.length ? '' : 'none';
  $('dNotes').textContent = p.notes || '';
  $('dGallery').innerHTML = (p.images||[]).map(path=>`<img data-path="${esc(path)}" alt="">`).join('');
  $('dGallery').style.display = p.images?.length ? '' : 'none';
  $('dGallery').querySelectorAll('img').forEach(el=>hydrateImg(el, el.dataset.path));
  $('detailSheet').classList.add('open');
}
$('editBtn').addEventListener('click', ()=>{
  const p = state.projects.find(x=>x.id===detailId);
  if(p) openEdit(p);
});

/* ================= 편집 ================= */
function blankProject(){
  return {id:uid(), title:'', pattern:'', yarn:'', needle:'', difficulty:0,
    status:'todo', startDate:'', endDate:'', notes:'', images:[],
    createdAt:Date.now(), updatedAt:Date.now()};
}
function openEdit(p){
  editingIsNew = !p;
  editing = p ? JSON.parse(JSON.stringify(p)) : blankProject();
  $('eTitleBar').textContent = editingIsNew ? '새 프로젝트' : '편집';
  $('fTitle').value = editing.title;
  $('fPattern').value = editing.pattern;
  $('fYarn').value = editing.yarn;
  $('fNeedle').value = editing.needle;
  $('fDate').value = editing.startDate;
  $('fEnd').value = editing.endDate || '';
  $('fNotes').value = editing.notes;
  renderDiff(); renderStatusSeg(); renderEditImgs();
  $('deleteZone').hidden = editingIsNew;
  $('editSheet').classList.add('open');
  autoGrow($('fNotes'));
}
$('addBtn').addEventListener('click', ()=>openEdit(null));
$('editCancel').addEventListener('click', ()=>{
  if(pendingUploads.size){ toast('사진 업로드가 끝날 때까지 잠깐만요'); return; }
  $('editSheet').classList.remove('open'); editing = null;
});

/* 난이도 */
function renderDiff(){
  $('fDiff').innerHTML = [1,2,3,4,5].map(n=>
    `<button type="button" data-n="${n}" class="${editing.difficulty>=n?'on':''}">●</button>`).join('');
}
$('fDiff').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  const n = +b.dataset.n;
  editing.difficulty = (editing.difficulty===n) ? 0 : n;
  renderDiff();
});

/* 진행상태 */
function renderStatusSeg(){
  $('fStatus').querySelectorAll('button').forEach(b=>
    b.classList.toggle('on', b.dataset.v===editing.status));
}
$('fStatus').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  editing.status = b.dataset.v; renderStatusSeg();
});

/* 이미지 편집 */
function renderEditImgs(){
  const g = $('fImgs');
  g.innerHTML = (editing.images||[]).map((path,i)=>`
    <div class="ph"><img data-path="${esc(path)}" alt="">
      <button class="rm" data-i="${i}" aria-label="사진 삭제">✕</button></div>`).join('')
    + `<button class="img-add" id="imgAdd" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>사진 추가</button>`;
  g.querySelectorAll('img[data-path]').forEach(el=>hydrateImg(el, el.dataset.path));
  $('imgAdd').addEventListener('click', ()=>{
    if(!token()){ toast('먼저 설정에서 GitHub 토큰을 연결해주세요'); openSettings(); return; }
    $('fileInput').click();
  });
}
$('fImgs').addEventListener('click', e=>{
  const b = e.target.closest('.rm'); if(!b) return;
  const i = +b.dataset.i;
  const path = editing.images[i];
  editing.images.splice(i,1);
  renderEditImgs();
  deleteRemoteImage(path); // 백그라운드 삭제
});
$('fileInput').addEventListener('change', async e=>{
  const files = [...e.target.files]; e.target.value = '';
  if(!files.length) return;
  const g = $('fImgs');
  for(const f of files){
    const key = uid(); pendingUploads.add(key);
    const ph = document.createElement('div');
    ph.className = 'ph';
    ph.innerHTML = `<div class="spin"><div class="spinner"></div></div>`;
    g.insertBefore(ph, $('imgAdd'));
    try{
      const path = await uploadImage(f);
      editing.images.push(path);
      renderEditImgs();
    }catch(err){
      ph.remove(); toast('사진 업로드 실패: ' + err.message);
    }finally{ pendingUploads.delete(key); }
  }
});

/* 저장 / 삭제 */
$('editSave').addEventListener('click', ()=>{
  if(pendingUploads.size){ toast('사진 업로드가 끝날 때까지 잠깐만요'); return; }
  editing.title = $('fTitle').value.trim();
  editing.pattern = $('fPattern').value.trim();
  editing.yarn = $('fYarn').value.trim();
  editing.needle = $('fNeedle').value.trim();
  editing.startDate = $('fDate').value;
  editing.endDate = $('fEnd').value;
  editing.notes = $('fNotes').value;
  editing.updatedAt = Date.now();
  if(editingIsNew) state.projects.push(editing);
  else{
    const i = state.projects.findIndex(p=>p.id===editing.id);
    if(i>-1) state.projects[i] = editing;
  }
  scheduleSave();
  $('editSheet').classList.remove('open');
  renderGrid();
  if(detailId === editing.id && $('detailSheet').classList.contains('open')) openDetail(editing.id);
  editing = null;
});
$('deleteBtn').addEventListener('click', ()=>{
  if(!confirm('이 프로젝트를 삭제할까요? 첨부한 사진도 함께 삭제돼요.')) return;
  const imgs = [...(editing.images||[])];
  state.projects = state.projects.filter(p=>p.id!==editing.id);
  scheduleSave();
  imgs.forEach(deleteRemoteImage);
  $('editSheet').classList.remove('open');
  $('detailSheet').classList.remove('open');
  editing = null; renderGrid();
  toast('삭제했어요');
});

/* textarea 자동 높이 */
function autoGrow(t){ t.style.height='auto'; t.style.height = Math.max(150, t.scrollHeight)+'px'; }
$('fNotes').addEventListener('input', e=>autoGrow(e.target));

/* ================= 설정 ================= */
function openSettings(){
  $('tokenInput').value = token();
  $('connStatus').textContent = token() ? '토큰이 저장되어 있어요.' : '아직 연결 전이에요.';
  renderSyncInfo();
  $('settingsSheet').classList.add('open');
}
function renderSyncInfo(){
  const t = +localStorage.getItem(LS_SYNCED);
  $('syncInfo').textContent = t
    ? `마지막 동기화: ${new Date(t).toLocaleString('ko-KR')} · 프로젝트 ${state.projects.length}개`
    : '아직 동기화 기록이 없어요.';
}
$('settingsBtn').addEventListener('click', openSettings);
$('tokenSave').addEventListener('click', async ()=>{
  const v = $('tokenInput').value.trim();
  if(!v){ toast('토큰을 입력해주세요'); return; }
  localStorage.setItem(LS_TOKEN, v);
  $('connStatus').textContent = '연결 확인 중...';
  const res = await gh('');
  if(res.ok || res.status === 404){
    $('connStatus').textContent = '✓ 연결됐어요.';
    toast('연결 성공'); pullData(true);
  }else{
    $('connStatus').textContent = `✗ 연결 실패 (${res.status}) — 토큰 권한을 확인해주세요.`;
  }
});
$('pullBtn').addEventListener('click', ()=>pullData(false));

/* 공용 닫기 */
document.querySelectorAll('[data-close]').forEach(b=>
  b.addEventListener('click', ()=>$(b.dataset.close).classList.remove('open')));

/* ================= 시작 ================= */
renderGrid();
if(token()) pullData(true);
else setSync('');
</script>
</body>
</html>
